[program:gotty]
command=/bin/bash -lc '. /home/user/scripts/common-env.sh; wait_runtime_prepared; exec /home/user/gotty --address 127.0.0.1 --port 8081 --path /t --credential "${ADMIN_EMAIL}:${ADMIN_PASSWORD}" -w bash'
directory=/home/user
user=1000
