worker_processes auto;
pid /home/user/nginx/nginx.pid;
error_log /home/user/logs/nginx.error.log warn;

events {
    worker_connections 1024;
}

http {
    include       /usr/local/openresty/nginx/conf/mime.types;
    default_type  application/octet-stream;
    charset utf-8;
    underscores_in_headers on;

    # Large browser cookies from prior sessions should not make OpenResty reject
    # the request before it reaches the upstream service.
    client_header_buffer_size 128k;
    large_client_header_buffers 16 512k;

    sendfile on;
    keepalive_timeout 65;
    access_log /home/user/logs/nginx.access.log;

    client_body_temp_path /home/user/nginx/tmp/body 1 2;
    proxy_temp_path       /home/user/nginx/tmp/proxy 1 2;
    fastcgi_temp_path     /home/user/nginx/tmp/fastcgi 1 2;
    uwsgi_temp_path       /home/user/nginx/tmp/uwsgi 1 2;
    scgi_temp_path        /home/user/nginx/tmp/scgi 1 2;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    map $http_x_forwarded_proto $forwarded_proto { default $http_x_forwarded_proto; '' $scheme; }
    map $http_x_forwarded_host  $forwarded_host  { default $http_x_forwarded_host;  '' $host;   }
    map $http_x_forwarded_port  $forwarded_port  { default $http_x_forwarded_port;  '' 443;     }

    server {
        listen 7860;
        server_name _;

        absolute_redirect off;
        port_in_redirect  off;
        client_max_body_size 256m;

        location = /api/sync-progress {
            content_by_lua_block {
                local progress_file = "/home/user/.sync-backup/.sync-progress.json"
                local f = io.open(progress_file, "r")
                if not f then
                    ngx.header["Content-Type"] = "application/json; charset=utf-8"
                    ngx.say('{"stage":"complete","progress":100}')
                    return
                end

                local content = f:read("*a")
                f:close()

                ngx.header["Content-Type"] = "application/json; charset=utf-8"
                ngx.say(content)
            }
        }

        location = /sync {
            proxy_http_version 1.1;
            proxy_set_header Host              $forwarded_host;
            proxy_set_header X-Forwarded-Host  $forwarded_host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $forwarded_proto;
            proxy_set_header X-Forwarded-Port  $forwarded_port;
            proxy_set_header X-Forwarded-Prefix /sync;
            proxy_read_timeout 600s;
            proxy_send_timeout 600s;
            proxy_buffering off;
            proxy_cache off;
            proxy_redirect off;
            proxy_pass http://127.0.0.1:5321/sync/;
        }

        location ^~ /sync/ {
            proxy_http_version 1.1;
            proxy_set_header Host              $forwarded_host;
            proxy_set_header X-Forwarded-Host  $forwarded_host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $forwarded_proto;
            proxy_set_header X-Forwarded-Port  $forwarded_port;
            proxy_set_header X-Forwarded-Prefix /sync;
            proxy_read_timeout 600s;
            proxy_send_timeout 600s;
            proxy_buffering off;
            proxy_cache off;
            proxy_redirect off;
            proxy_pass http://127.0.0.1:5321;
        }

        location = /pgadmin4 {
            return 308 /pgadmin4/;
        }

        location ^~ /pgadmin4/ {
            proxy_http_version 1.1;
            proxy_set_header Host              $forwarded_host;
            proxy_set_header X-Forwarded-Host  $forwarded_host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $forwarded_proto;
            proxy_set_header X-Forwarded-Port  $forwarded_port;
            proxy_set_header X-Script-Name     /pgadmin4;
            proxy_set_header X-Scheme          $forwarded_proto;
            proxy_set_header Upgrade           $http_upgrade;
            proxy_set_header Connection        $connection_upgrade;
            proxy_read_timeout 600s;
            proxy_send_timeout 600s;
            proxy_buffering off;
            proxy_cache off;
            proxy_cookie_path / /pgadmin4/;
            proxy_redirect off;
            proxy_pass http://127.0.0.1:5050;
        }

        location = /filebrowser {
            return 308 /filebrowser/;
        }

        location ^~ /filebrowser/ {
            proxy_http_version 1.1;
            proxy_set_header Host              $forwarded_host;
            proxy_set_header X-Forwarded-Host  $forwarded_host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $forwarded_proto;
            proxy_set_header X-Forwarded-Port  $forwarded_port;
            proxy_set_header X-Forwarded-Prefix /filebrowser;
            proxy_set_header Upgrade           $http_upgrade;
            proxy_set_header Connection        $connection_upgrade;
            proxy_read_timeout 600s;
            proxy_send_timeout 600s;
            proxy_buffering off;
            proxy_cache off;
            proxy_redirect off;
            proxy_pass http://127.0.0.1:8888;
        }

        location = /t {
            proxy_http_version 1.1;
            proxy_set_header Host              $forwarded_host;
            proxy_set_header X-Forwarded-Host  $forwarded_host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $forwarded_proto;
            proxy_set_header X-Forwarded-Port  $forwarded_port;
            proxy_set_header X-Forwarded-Prefix /t;
            proxy_set_header Upgrade           $http_upgrade;
            proxy_set_header Connection        $connection_upgrade;
            proxy_read_timeout 600s;
            proxy_send_timeout 600s;
            proxy_buffering off;
            proxy_cache off;
            proxy_redirect off;
            proxy_pass http://127.0.0.1:8081/t;
        }

        location = /t/ {
            proxy_http_version 1.1;
            proxy_set_header Host              $forwarded_host;
            proxy_set_header X-Forwarded-Host  $forwarded_host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $forwarded_proto;
            proxy_set_header X-Forwarded-Port  $forwarded_port;
            proxy_set_header X-Forwarded-Prefix /t;
            proxy_set_header Upgrade           $http_upgrade;
            proxy_set_header Connection        $connection_upgrade;
            proxy_read_timeout 600s;
            proxy_send_timeout 600s;
            proxy_buffering off;
            proxy_cache off;
            proxy_redirect off;
            proxy_pass http://127.0.0.1:8081/t/;
        }

        location ^~ /t/ {
            proxy_http_version 1.1;
            proxy_set_header Host              $forwarded_host;
            proxy_set_header X-Forwarded-Host  $forwarded_host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $forwarded_proto;
            proxy_set_header X-Forwarded-Port  $forwarded_port;
            proxy_set_header X-Forwarded-Prefix /t;
            proxy_set_header Upgrade           $http_upgrade;
            proxy_set_header Connection        $connection_upgrade;
            proxy_read_timeout 600s;
            proxy_send_timeout 600s;
            proxy_buffering off;
            proxy_cache off;
            proxy_redirect off;
            proxy_pass http://127.0.0.1:8081;
        }

        location / {
            proxy_http_version 1.1;
            proxy_set_header Host              $forwarded_host;
            proxy_set_header X-Forwarded-Host  $forwarded_host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $forwarded_proto;
            proxy_set_header X-Forwarded-Port  $forwarded_port;
            proxy_set_header Authorization     $http_authorization;
            proxy_set_header Upgrade           $http_upgrade;
            proxy_set_header Connection        $connection_upgrade;
            proxy_read_timeout 600s;
            proxy_send_timeout 600s;
            proxy_buffering off;
            proxy_cache off;
            proxy_redirect off;
            proxy_pass http://127.0.0.1:19090;
        }
    }
}
